openapi: 3.0.3
info:
  title: Auth Service Upstream API л¬ём„ң
  version: 1.0.0
  description: |
    Local copy of service-contract/contracts/openapi/auth-service.upstream.v1.yaml.
    мқҙ л¬ём„ңлҠ” Auth-service upstream routeл§Ң м„ӨлӘ…н•©лӢҲлӢӨ.
    Public /v1 routeлҠ” Gateway contractк°Җ мҶҢмң н•©лӢҲлӢӨ.
    мқҙ м„ңл№„мҠӨлҠ” лЎңк·ёмқё, нҶ нҒ° к°ұмӢ , лЎңк·ём•„мӣғ, GitHub SSO, м„ём…ҳ кІҖмҰқ, лӮҙл¶Җ auth account кҙҖлҰ¬лҘј м ңкіөн•©лӢҲлӢӨ.
servers:
  - url: /
    description: auth-service м§Ғм ‘ нҳём¶ң кё°ліё кІҪлЎң

tags:
  - name: Status
    description: м„ңл№„мҠӨ мғҒнғңмҷҖ мҳӨлҘҳ endpoint
  - name: Auth
    description: л№„л°ҖлІҲнҳё лЎңк·ёмқё, нҶ нҒ° к°ұмӢ , лЎңк·ём•„мӣғ API
  - name: SSO
    description: GitHub SSOмҷҖ лёҢлқјмҡ°м Җ м„ём…ҳ API
  - name: Internal
    description: лӮҙл¶Җ service-to-service API
  - name: JWKS
    description: JSON Web Key Set endpointмһ…лӢҲлӢӨ.

paths:
  /:
    get:
      tags: [Status]
      summary: м„ңл№„мҠӨ мғҒнғң
      operationId: getRootStatus
      responses:
        '200':
          description: м„ңл№„мҠӨк°Җ м •мғҒ лҸҷмһ‘ мӨ‘мһ…лӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /error:
    get:
      tags: [Status]
      summary: Spring мҳӨлҘҳ endpoint мЎ°нҡҢ
      operationId: getError
      responses:
        default:
          description: мҳӨлҘҳ мқ‘лӢө
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEndpointResponse'

  /.well-known/jwks.json:
    get:
      tags: [JWKS]
      summary: JSON Web Key Set мЎ°нҡҢ
      operationId: getJwks
      responses:
        '200':
          description: JWKS мқ‘лӢөмһ…лӢҲлӢӨ. RSA public keyк°Җ м„Өм •лҗҳм§Җ м•Ҡмңјл©ҙ л№Ҳ keysлҘј л°ҳнҷҳн•©лӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: л№„л°ҖлІҲнҳё лЎңк·ёмқё
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: лЎңк·ёмқёмқҙ м„ұкіөн–ҲмҠөлӢҲлӢӨ. access tokenкіј refresh tokenмқ„ bodyмҷҖ cookieлЎң л°ҳнҷҳн•©лӢҲлӢӨ.
          headers:
            Set-Cookie:
              description: ACCESS_TOKENкіј refresh token cookieмһ…лӢҲлӢӨ.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: access tokenкіј refresh token к°ұмӢ 
      operationId: refresh
      description: м„Өм •лҗң refresh token cookieм—җм„ң refresh tokenмқ„ м¶”м¶ңн•©лӢҲлӢӨ.
      responses:
        '200':
          description: нҶ нҒ° к°ұмӢ мқҙ м„ұкіөн–ҲмҠөлӢҲлӢӨ.
          headers:
            Set-Cookie:
              description: rotationлҗң refresh cookieмҷҖ ACCESS_TOKEN cookieмһ…лӢҲлӢӨ.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: лЎңк·ём•„мӣғ
      operationId: logout
      description: refresh token лҳҗлҠ” sessionмқҙ мһҲмңјл©ҙ нҸҗкё°н•ҳкі  мқёмҰқ cookieлҘј мӮӯм ңн•©лӢҲлӢӨ.
      security:
        - bearerAuth: []
        - accessTokenCookie: []
        - ssoSessionCookie: []
      responses:
        '204':
          description: лЎңк·ём•„мӣғмқҙ м„ұкіөн–Ҳкі  cookieк°Җ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ.
          headers:
            Set-Cookie:
              description: cookie мӮӯм ң headerмһ…лӢҲлӢӨ.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sso/start:
    get:
      tags: [SSO]
      summary: GitHub SSO мӢңмһ‘
      operationId: startGithubSso
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          description: GitHub OAuth authorizationмңјлЎң redirectн•©лӢҲлӢӨ.
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/login/github:
    get:
      tags: [SSO]
      summary: GitHub лЎңк·ёмқё мӢңмһ‘
      operationId: loginGithub
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          description: GitHub OAuth authorizationмңјлЎң redirectн•©лӢҲлӢӨ.
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/oauth2/authorize/github:
    get:
      tags: [SSO]
      summary: GitHub OAuth лЎңк·ёмқё мӢңмһ‘
      operationId: authorizeGithubOAuth
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          description: GitHub OAuth authorizationмңјлЎң redirectн•©лӢҲлӢӨ.
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/oauth/github/callback:
    get:
      tags: [SSO]
      summary: legacy GitHub OAuth callback redirect мІҳлҰ¬
      operationId: oauthGithubCallback
      description: legacy callback кІҪлЎңлҘј `/login/oauth2/code/github`мңјлЎң redirectн•©лӢҲлӢӨ.
      responses:
        '302':
          description: Spring OAuth2 callback endpointлЎң redirectн•©лӢҲлӢӨ.
          headers:
            Location:
              schema:
                type: string

  /login/oauth2/code/github:
    get:
      tags: [SSO]
      summary: GitHub OAuth callback
      operationId: githubOAuthCallback
      description: Gateway public `/v1/login/oauth2/code/github`м—җм„ң `/v1` prefixлҘј м ңкұ°н•ҙ м „лӢ¬лҗҳлҠ” Spring Security OAuth callbackмһ…лӢҲлӢӨ.
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: SSO ticket лҳҗлҠ” errorлҘј нҸ¬н•Ён•ң frontend redirectлЎң мқ‘лӢөн•©лӢҲлӢӨ.
          headers:
            Location:
              schema:
                type: string

  /auth/exchange:
    post:
      tags: [SSO]
      summary: мқјнҡҢм„ұ SSO ticketмқ„ cookieлЎң көҗнҷҳ
      operationId: exchangeSsoTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoExchangeRequest'
      responses:
        '204':
          description: көҗнҷҳмқҙ м„ұкіөн–ҲмҠөлӢҲлӢӨ. session, access token, refresh token cookieлҘј м„Өм •н•©лӢҲлӢӨ.
          headers:
            Set-Cookie:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/internal/session/validate:
    post:
      tags: [Internal]
      summary: нҳ„мһ¬ auth session кІҖмҰқ
      operationId: validateInternalSession
      security:
        - internalApiKey: []
          bearerAuth: []
        - internalApiKey: []
          accessTokenCookie: []
        - internalApiKey: []
          ssoSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/InternalSecret'
      responses:
        '200':
          description: session кІҖмҰқ кІ°кіјмһ…лӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSessionValidationResponse'
        '401':
          description: мқёмҰқлҗң sessionмқҙ м•„лӢҷлӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSessionValidationResponse'

  /auth/session:
    get:
      tags: [SSO]
      summary: лёҢлқјмҡ°м Җ session кІҖмҰқ
      operationId: getSession
      security:
        - bearerAuth: []
        - accessTokenCookie: []
        - ssoSessionCookie: []
      responses:
        '200':
          description: session кІҖмҰқ кІ°кіјмһ…лӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSessionValidationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [SSO]
      summary: нҳ„мһ¬ SSO principal мЎ°нҡҢ
      operationId: getMe
      security:
        - bearerAuth: []
        - accessTokenCookie: []
        - ssoSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: нҳ„мһ¬ мӮ¬мҡ©мһҗ profileмһ…лӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/auth/accounts:
    post:
      tags: [Internal]
      summary: auth account мғқм„ұ
      operationId: createInternalAuthAccount
      security:
        - internalApiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InternalSecret'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: accountк°Җ мғқм„ұлҗҳм—ҲмҠөлӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountGlobalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /internal/auth/accounts/{userId}:
    delete:
      tags: [Internal]
      summary: user idлЎң auth account мӮӯм ң
      operationId: deleteInternalAuthAccount
      security:
        - internalApiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InternalSecret'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: accountк°Җ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoidGlobalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: ACCESS_TOKEN
    ssoSessionCookie:
      type: apiKey
      in: cookie
      name: sso_session
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Request-Secret

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: string
        enum: [explain, editor, admin]
      description: лҢҖмғҒ page typeмһ…лӢҲлӢӨ. admin pageлҠ” IP allow-list кІҖмҰқмқҙ н•„мҡ”н•  мҲҳ мһҲмҠөлӢҲлӢӨ.
    RedirectUri:
      name: redirect_uri
      in: query
      required: false
      schema:
        type: string
        format: uri
      description: л“ұлЎқлҗң frontend redirect URIмһ…лӢҲлӢӨ.
    InternalSecret:
      name: X-Internal-Request-Secret
      in: header
      required: false
      schema:
        type: string
      description: лӮҙл¶Җ API secret headerмһ…лӢҲлӢӨ. м„ңл№„мҠӨ м„Өм •м—җ л”°лқј Authorization headerлҸ„ н—Ҳмҡ©лҗ  мҲҳ мһҲмҠөлӢҲлӢӨ.

  responses:
    BadRequest:
      description: мһҳлӘ»лҗң мҡ”мІӯмһ…лӢҲлӢӨ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoidGlobalResponse'
    Unauthorized:
      description: мқёмҰқмқҙ н•„мҡ”н•ҳкұ°лӮҳ tokenмқҙ мң нҡЁн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoidGlobalResponse'
    Forbidden:
      description: м ‘к·јмқҙ кұ°л¶Җлҗҳм—ҲмҠөлӢҲлӢӨ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoidGlobalResponse'
    NotFound:
      description: лҰ¬мҶҢмҠӨлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoidGlobalResponse'
    Conflict:
      description: лҰ¬мҶҢмҠӨ м¶©лҸҢмһ…лӢҲлӢӨ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoidGlobalResponse'

  schemas:
    StatusResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
          example: auth-service
        status:
          type: string
          example: UP

    ErrorEndpointResponse:
      type: object
      required: [status, error, message]
      properties:
        status:
          type: integer
          example: 500
        error:
          type: string
          example: лӮҙл¶Җ м„ңлІ„ мҳӨлҘҳ
        message:
          type: string
          example: лӮҙл¶Җ м„ңлІ„ мҳӨлҘҳ

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: Password12!

    TokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
          description: JWT access tokenмһ…лӢҲлӢӨ.
        refreshToken:
          type: string
          description: JWT refresh tokenмһ…лӢҲлӢӨ.

    SsoExchangeRequest:
      type: object
      required: [ticket]
      properties:
        ticket:
          type: string
          example: 9d19d206-1a0c-4b7e-9e2e-c89aa4089a10

    InternalSessionValidationResponse:
      type: object
      required: [authenticated, userId, role, status, sessionId]
      properties:
        authenticated:
          type: boolean
          example: true
        userId:
          type: string
          example: 46c45ce7-d50c-436e-9394-263941839cf7
        role:
          type: string
          example: USER
        status:
          type: string
          example: A
        sessionId:
          type: string
          example: 2e9e6db8-3d04-4260-a1fd-c799b79d2d26

    MeResponse:
      type: object
      required: [id, email, name, roles, status]
      properties:
        id:
          type: string
          example: 46c45ce7-d50c-436e-9394-263941839cf7
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane User
        avatarUrl:
          type: string
          nullable: true
          example: https://avatars.githubusercontent.com/u/123456
        roles:
          type: array
          items:
            type: string
          example: [USER]
        status:
          type: string
          example: A

    CreateAccountRequest:
      type: object
      required: [userId, loginId, password]
      properties:
        userId:
          type: string
          format: uuid
        loginId:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: Password12!

    AccountResponse:
      type: object
      required: [authId, userId, loginId]
      properties:
        authId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        loginId:
          type: string
          format: email
          example: user@example.com

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Jwk'

    Jwk:
      type: object
      properties:
        kty:
          type: string
          example: RSA
        use:
          type: string
          example: sig
        alg:
          type: string
          example: RS256
        kid:
          type: string
          example: auth-jwt-key
        n:
          type: string
          description: base64urlлЎң мқёмҪ”л”©лҗң RSA modulusмһ…лӢҲлӢӨ.
        e:
          type: string
          description: base64urlлЎң мқёмҪ”л”©лҗң RSA exponentмһ…лӢҲлӢӨ.

    VoidGlobalResponse:
      allOf:
        - $ref: '#/components/schemas/GlobalResponse'
        - type: object
          properties:
            data:
              nullable: true

    AccountGlobalResponse:
      allOf:
        - $ref: '#/components/schemas/GlobalResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountResponse'

    GlobalResponse:
      type: object
      required: [httpStatus, success, message, code]
      properties:
        httpStatus:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: мЎ°нҡҢ мҡ”мІӯ м„ұкіө
        code:
          type: integer
          example: 1
        data:
          nullable: true
