name: auth-service-ec2

services:
  auth-service:
    image: ${AUTH_SERVICE_IMAGE:?AUTH_SERVICE_IMAGE is required}
    pull_policy: always
    depends_on:
      auth-mysql:
        condition: service_healthy
    env_file:
      - ./.env.production
    command: ["--spring.profiles.active=prod"]
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_HOST_BIND:-127.0.0.1}:${AUTH_SERVICE_HOST_PORT:-8081}:8081"
    expose:
      - "8081"
    networks:
      - service-shared
      - auth-private

  auth-mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./.env.production
    volumes:
      - auth-mysql-volume:/var/lib/mysql
      - type: bind
        source: ./services/mysql/my.cnf
        target: /etc/mysql/my.cnf
      - type: bind
        source: ./services/mysql/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
      - type: bind
        source: ./db/schema.sql
        target: /schema/auth-schema.sql
        read_only: true
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h "$$MYSQL_HOST" -u "$$MYSQL_USER" -p"$$MYSQL_PASSWORD"
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-private

volumes:
  auth-mysql-volume:

networks:
  service-shared:
    external: true
    name: ${SERVICE_SHARED_NETWORK:-service-backbone-shared}
  auth-private:
    driver: bridge
    internal: true
